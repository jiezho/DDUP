services:
  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      DDUP_WIKI_ENABLED: ${DDUP_WIKI_ENABLED:-true}
      DDUP_WIKI_VAULT_PATH: ${DDUP_WIKI_VAULT_PATH:-/opt/ddup/wiki-vault}
      DDUP_WIKI_RAW_DIR: ${DDUP_WIKI_RAW_DIR:-_raw}
      HERMES_API_BASE: ${HERMES_API_BASE:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-agent}
    volumes:
      - ${DDUP_WIKI_VAULT_PATH:-/opt/ddup/wiki-vault}:${DDUP_WIKI_VAULT_PATH:-/opt/ddup/wiki-vault}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ../apps/web
    depends_on:
      - api
    ports:
      - "80:80"

